<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Playwright · Runs (Enhanced)</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;500;600&family=DM+Sans:wght@400;500&display=swap" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <style>
    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --surface2: #f1f5f9;
      --border: #e2e8f0;
      --border2: #cbd5e1;
      --muted: #64748b;
      --dim: #94a3b8;
      --body: #334155;
      --head: #0f172a;
      --amber: #f59e0b;
      --green: #10b981;
      --red: #ef4444;
      --yellow: #f59e0b;
      --blue: #3b82f6;
      --mono: 'JetBrains Mono', monospace;
      --sans: 'DM Sans', sans-serif;
      --display: 'Syne', sans-serif;
    }

    /* Dark Mode Overrides */
    body.dark {
      --bg: #080b0e;
      --surface: #0d1117;
      --surface2: #131920;
      --border: #1e2830;
      --border2: #263040;
      --muted: #4a5568;
      --dim: #718096;
      --body: #c9d5e0;
      --head: #edf2f7;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--body);
      min-height: 100vh;
      transition: background 0.2s, color 0.2s;
    }

    .header {
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-inner {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }

    .logo-icon {
      width: 34px;
      height: 34px;
      background: var(--amber);
      border-radius: 4px;
      display: grid;
      place-items: center;
      font-size: 17px;
    }

    .logo-name {
      font-family: var(--display);
      font-size: .95rem;
      font-weight: 800;
      color: var(--head);
    }

    .main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 24px;
      padding: 16px;
      border: 1px solid var(--border);
      background: var(--surface);
      border-radius: 8px;
    }

    .filter-field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .filter-field label {
      font-family: var(--mono);
      font-size: .6rem;
      text-transform: uppercase;
      color: var(--muted);
    }

    .filter-field select, .filter-field input {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--body);
      padding: 6px 12px;
      border-radius: 4px;
      outline: none;
    }

    .kpi-strip {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }

    .kpi {
      background: var(--surface);
      padding: 20px;
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    .kpi-label {
      font-size: .7rem;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .kpi-val {
      font-family: var(--display);
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--head);
    }

    /* Table Styles */
    .table-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      text-align: left;
      padding: 12px 16px;
      background: var(--surface2);
      font-size: .7rem;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }

    td {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      font-size: .85rem;
    }

    /* Count Colors */
    .counts { font-family: var(--mono); font-weight: 600; }
    .c-p { color: var(--green); }
    .c-f { color: var(--red); }
    .c-s { color: var(--blue); }
    .c-k { color: var(--amber); }

    .badge {
      padding: 4px 8px;
      border-radius: 4px;
      font-size: .7rem;
      font-weight: 700;
      text-transform: uppercase;
    }
    .badge-passed { background: rgba(16, 185, 129, 0.1); color: var(--green); }
    .badge-failed { background: rgba(239, 68, 68, 0.1); color: var(--red); }
    .badge-flaky { background: rgba(245, 158, 11, 0.1); color: var(--amber); }

    .btn {
      padding: 6px 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
      color: var(--body);
      font-size: .75rem;
    }

    .btn:hover { border-color: var(--amber); }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal {
      background: var(--surface);
      width: 90%;
      max-width: 1000px;
      max-height: 80vh;
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .modal-header { padding: 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
    .modal-body { padding: 16px; overflow-y: auto; }

    .charts-row { display: grid; grid-template-columns: 2fr 1fr; gap: 24px; margin-bottom: 24px; }
    .chart-box { background: var(--surface); padding: 20px; border: 1px solid var(--border); border-radius: 8px; }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a class="logo" href="#">
        <div class="logo-icon">🎭</div>
        <div class="logo-name">Playwright Dashboard</div>
      </a>
      <div class="prefs">
        <label><input type="checkbox" id="pref-dark"> Dark Mode</label>
        <button class="btn" onclick="location.reload()">Refresh</button>
      </div>
    </div>
  </header>

  <main class="main">
    <div class="filters">
      <div class="filter-field">
        <label>Environment</label>
        <select id="f-env" onchange="applyFilters()"><option value="">All</option></select>
      </div>
      <div class="filter-field">
        <label>Status</label>
        <select id="f-status" onchange="applyFilters()">
          <option value="">All</option>
          <option value="passed">Passed</option>
          <option value="failed">Failed</option>
        </select>
      </div>
      <div class="filter-field">
        <button class="btn" id="compare-btn" onclick="openCompare()" disabled>Compare Selected</button>
      </div>
    </div>

    <div class="kpi-strip">
      <div class="kpi"><div class="kpi-label">Total Runs</div><div class="kpi-val" id="k-runs">—</div></div>
      <div class="kpi"><div class="kpi-label">Pass Rate</div><div class="kpi-val" id="k-rate">—</div></div>
      <div class="kpi"><div class="kpi-label">Avg Duration</div><div class="kpi-val" id="k-dur">—</div></div>
    </div>

    <div class="charts-row">
      <div class="chart-box"><h3>Trend</h3><canvas id="c-trend"></canvas></div>
      <div class="chart-box"><h3>Breakdown</h3><canvas id="c-donut"></canvas></div>
    </div>

    <div class="table-card">
      <div id="table-wrap">Loading runs...</div>
    </div>
  </main>

  <div id="modal-backdrop" class="modal-backdrop">
    <div class="modal">
      <div class="modal-header"><h3 id="modal-title">Details</h3><button onclick="closeModal()">×</button></div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <script>
    let allRuns = [], filtered = [];
    let tChart, dChart;

    async function load() {
      const isDark = localStorage.getItem('pref-dark') === '1';
      document.getElementById('pref-dark').checked = isDark;
      if (isDark) document.body.classList.add('dark');

      document.getElementById('pref-dark').addEventListener('change', (e) => {
        const dark = e.target.checked;
        localStorage.setItem('pref-dark', dark ? '1' : '0');
        document.body.classList.toggle('dark', dark);
      });

      try {
        const r = await fetch('./data/manifest.json?_=' + Date.now());
        const m = await r.json();
        allRuns = m.runs || [];
      } catch (e) {
        allRuns = demoData();
      }

      const eSel = document.getElementById('f-env');
      [...new Set(allRuns.map(r => r.environment))].forEach(env => {
        const opt = document.createElement('option'); opt.value = opt.textContent = env; eSel.appendChild(opt);
      });

      applyFilters();
    }

    function applyFilters() {
      const env = document.getElementById('f-env').value;
      const status = document.getElementById('f-status').value;

      filtered = allRuns.filter(r => {
        if (env && r.environment !== env) return false;
        if (status && r.status !== status) return false;
        return true;
      });

      renderKPIs();
      renderCharts();
      renderTable();
    }

    function renderKPIs() {
      const n = filtered.length;
      const passed = filtered.filter(r => r.status === 'passed').length;
      document.getElementById('k-runs').textContent = n;
      document.getElementById('k-rate').textContent = n ? Math.round(passed/n*100) + '%' : '0%';
      const avg = n ? filtered.reduce((a, b) => a + (b.duration || 0), 0) / n : 0;
      document.getElementById('k-dur').textContent = (avg / 1000).toFixed(1) + 's';
    }

    function renderTable() {
      const rows = filtered.map((r, idx) => `
        <tr>
          <td><input type="checkbox" onchange="onSelectRun(this, ${idx})"></td>
          <td><span class="badge badge-${r.status}">${r.status}</span></td>
          <td>${r.project} <br><small style="color:var(--muted)">${r.environment}</small></td>
          <td>${new Date(r.timestamp).toLocaleDateString()}</td>
          <td class="counts">
            <span class="c-p">${r.passed || 0}</span> / 
            <span class="c-f">${r.failed || 0}</span> / 
            <span class="c-s">${r.skipped || 0}</span>
          </td>
          <td>${(r.duration / 1000).toFixed(1)}s</td>
          <td><button class="btn" onclick='openRunDetails(${idx})'>Details</button></td>
        </tr>
      `).join('');

      document.getElementById('table-wrap').innerHTML = `
        <table>
          <thead><tr><th></th><th>Status</th><th>Project</th><th>Date</th><th>P/F/S</th><th>Duration</th><th></th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    let selected = [];
    function onSelectRun(cb, idx) {
      if (cb.checked) selected.push(filtered[idx]);
      else selected = selected.filter(s => s !== filtered[idx]);
      document.getElementById('compare-btn').disabled = selected.length !== 2;
    }

    async function openRunDetails(idx) {
      const run = filtered[idx];
      document.getElementById('modal-title').textContent = `Run Details: ${run.project}`;
      document.getElementById('modal-backdrop').style.display = 'flex';
      document.getElementById('modal-body').innerHTML = 'Loading...';

      try {
        const res = await fetch(run.testsFile || run.jsonFile);
        const data = await res.json();
        const tests = Array.isArray(data) ? data : []; // Simplified for demo
        const rows = tests.map(t => `
          <tr>
            <td><span class="badge badge-${t.status === 'expected' ? 'passed' : 'failed'}">${t.status}</span></td>
            <td>${t.title}</td>
            <td>${(t.duration / 1000).toFixed(2)}s</td>
          </tr>
        `).join('');
        document.getElementById('modal-body').innerHTML = `<table><thead><tr><th>Status</th><th>Test</th><th>Duration</th></tr></thead><tbody>${rows}</tbody></table>`;
      } catch (e) {
        document.getElementById('modal-body').innerHTML = 'Could not load test details.';
      }
    }

    function closeModal() { document.getElementById('modal-backdrop').style.display = 'none'; }

    function renderCharts() {
      const ctxT = document.getElementById('c-trend').getContext('2d');
      if (tChart) tChart.destroy();
      tChart = new Chart(ctxT, {
        type: 'line',
        data: {
          labels: filtered.slice(-10).map(r => new Date(r.timestamp).toLocaleDateString()),
          datasets: [{ label: 'Pass Rate', data: filtered.slice(-10).map(r => (r.passed/r.total)*100), borderColor: '#f59e0b', tension: 0.3 }]
        }
      });

      const ctxD = document.getElementById('c-donut').getContext('2d');
      if (dChart) dChart.destroy();
      const p = filtered.filter(r => r.status === 'passed').length;
      const f = filtered.filter(r => r.status === 'failed').length;
      dChart = new Chart(ctxD, {
        type: 'doughnut',
        data: { labels: ['Pass', 'Fail'], datasets: [{ data: [p, f], backgroundColor: ['#10b981', '#ef4444'] }] }
      });
    }

    function demoData() {
      return Array.from({length: 10}, (_, i) => ({
        project: 'Demo Project', environment: 'CI', status: i % 3 === 0 ? 'failed' : 'passed',
        timestamp: new Date().toISOString(), passed: 10, failed: i % 3 === 0 ? 2 : 0, skipped: 1, total: 13, duration: 45000
      }));
    }

    load();
  </script>
</body>
</html>
